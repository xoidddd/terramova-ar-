<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      /* Indicador de carga opcional */
      #scanning-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; color: white; z-index: 100; pointer-events: none; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div id="scanning-overlay">Apunte al marco de TERRAMOVA...</div>

    <a-scene 
      mindar-image="imageTargetSrc: targets.mind; filterMinCF:0.0001; filterBeta: 0.001; missTolerance: 10" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="mova" src="mova.glb"></a-asset-item>
        <a-asset-item id="logo" src="logocolores.glb"></a-asset-item>
        <a-asset-item id="map" src="mapfin.glb"></a-asset-item>
        <a-asset-item id="like" src="likefin.glb"></a-asset-item>
        <a-asset-item id="flash" src="flashfin.glb"></a-asset-item>
        <a-asset-item id="security" src="segurityfin.glb"></a-asset-item>
        <a-asset-item id="love" src="notilovefin.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target-anchor">
        <a-gltf-model src="#mova" position="0 0.7 0.1" scale="0.25 0.25 0.25" 
          animation="property: position; to: 0 0.75 0.1; dur: 1500; dir: alternate; loop: true">
        </a-gltf-model>

        <a-gltf-model src="#logo" position="0 -0.65 0.1" scale="0.2 0.2 0.2"></a-gltf-model>

        <a-gltf-model src="#map" position="-0.55 0.3 0.1" scale="0.15 0.15 0.15"></a-gltf-model>
        <a-gltf-model src="#like" position="0.55 0.3 0.1" scale="0.15 0.15 0.15"></a-gltf-model>
        <a-gltf-model src="#flash" position="-0.55 -0.3 0.1" scale="0.15 0.15 0.15"></a-gltf-model>
        <a-gltf-model src="#love" position="0.55 -0.3 0.1" scale="0.15 0.15 0.15"></a-gltf-model>
        <a-gltf-model src="#security" position="0 0 0.1" scale="0.15 0.15 0.15"></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      // Ocultar el texto de carga cuando detecte el marco
      const sceneEl = document.querySelector('a-scene');
      const overlay = document.querySelector('#scanning-overlay');
      sceneEl.addEventListener("targetFound", () => overlay.classList.add('hidden'));
      sceneEl.addEventListener("targetLost", () => overlay.classList.remove('hidden'));
    </script>
  </body>
</html>
